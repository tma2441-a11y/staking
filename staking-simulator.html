<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebKey ステーキング シミュレーター</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function StakingSimulator() {
            // 入力パラメータ
            const [initialInvestment, setInitialInvestment] = useState(730.9262); // 投資金額
            const [initialStaking, setInitialStaking] = useState(750.0517); // ステーキング残高
            const [dailyUSDT, setDailyUSDT] = useState(2000); // 1日あたりの使用USDT
            const [days, setDays] = useState(365); // シミュレーション日数

            // 固定日利（0.68%）
            const R_DAILY = 0.0068;

            // 計算結果
            const [results, setResults] = useState({
                patternA: { holding: 0, staking: 0, turbo: 0, total: 0, usdt: 0, profit: 0 },
                patternB: { holding: 0, staking: 0, turbo: 0, total: 0, usdt: 0, profit: 0 },
                chartData: { labels: [], dataA: [], dataB: [] }
            });

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // 計算ロジック
            const calculateSimulation = (initialInv, initialStak, U_daily, Days) => {
                // パターンA：完全放置（利息は放置・ターボプールに蓄積）
                let holding_A = initialInv; // 手持ち金（常に初期投資額）
                let staking_A = initialStak; // ステーキング残高（複利で増える）
                let turbo_A = 0; // ターボプール（利息が蓄積、複利なし）
                const chartLabelsA = [];
                const chartDataA = [];

                for (let t = 0; t <= Days; t++) {
                    if (t === 0) {
                        chartLabelsA.push(t);
                        chartDataA.push(initialInv + initialStak);
                    } else {
                        // 毎日の利息発生
                        const interest = staking_A * R_DAILY;
                        // 利息はターボプールに蓄積（複利なし）
                        turbo_A += interest;
                        // ステーキング残高は複利で増える
                        staking_A = staking_A * (1 + R_DAILY);

                        // チャート用（同じペースで記録）
                        if (t % Math.max(1, Math.floor(Days / 100)) === 0 || t === Days) {
                            chartLabelsA.push(t);
                            chartDataA.push(Math.round(holding_A + staking_A + turbo_A));
                        }
                    }
                }

                const total_A = holding_A + staking_A + turbo_A;
                const profit_A = total_A - initialInv;

                // パターンB：毎日ターボ実行（利息受け取り + USDT支払い）
                let holding_B = initialInv; // 手持ち金（利息を受け取ると増える）
                let staking_B = initialStak; // ステーキング残高（複利で増える）
                let turbo_B = 0; // ターボプール
                let usdt_used = 0; // 使用USDT累計
                const chartDataB = [];

                for (let t = 0; t <= Days; t++) {
                    if (t === 0) {
                        chartDataB.push(initialInv + initialStak);
                    } else {
                        // ステップ1：利息発生
                        const interest = staking_B * R_DAILY;
                        // ステップ2：ターボプールに利息を追加
                        turbo_B += interest;
                        // ステップ3：ステーキング残高は複利で増える
                        staking_B = staking_B * (1 + R_DAILY);
                        // ステップ4：毎日ターボ実行（U_daily分引き出す）
                        if (turbo_B >= U_daily) {
                            turbo_B -= U_daily; // ターボプールから引き出す
                            holding_B += U_daily; // 手持ち金に追加（利息として受け取る）
                            usdt_used += U_daily; // USDT使用カウント
                        }

                        // チャート用（同じペースで記録）
                        if (t % Math.max(1, Math.floor(Days / 100)) === 0 || t === Days) {
                            chartDataB.push(Math.round(holding_B + staking_B + turbo_B));
                        }
                    }
                }

                const total_B = holding_B + staking_B + turbo_B;
                const profit_B = total_B - initialInv - usdt_used;

                return {
                    patternA: {
                        holding: Math.round(holding_A),
                        staking: Math.round(staking_A),
                        turbo: Math.round(turbo_A),
                        total: Math.round(total_A),
                        usdt: 0,
                        profit: Math.round(profit_A)
                    },
                    patternB: {
                        holding: Math.round(holding_B),
                        staking: Math.round(staking_B),
                        turbo: Math.round(turbo_B),
                        total: Math.round(total_B),
                        usdt: Math.round(usdt_used),
                        profit: Math.round(profit_B)
                    },
                    chartData: {
                        labels: chartLabelsA,
                        dataA: chartDataA,
                        dataB: chartDataB
                    }
                };
            };

            // 計算実行
            useEffect(() => {
                const newResults = calculateSimulation(initialInvestment, initialStaking, dailyUSDT, days);
                setResults(newResults);
            }, [initialInvestment, initialStaking, dailyUSDT, days]);

            // チャート描画
            useEffect(() => {
                if (chartRef.current && results.chartData.labels.length > 0) {
                    const ctx = chartRef.current.getContext('2d');

                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: results.chartData.labels,
                            datasets: [
                                {
                                    label: 'パターンA：利息放置',
                                    data: results.chartData.dataA,
                                    borderColor: '#3b82f6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    tension: 0.3,
                                    borderWidth: 2,
                                    pointRadius: 0,
                                    pointHoverRadius: 6,
                                    fill: true
                                },
                                {
                                    label: 'パターンB：毎日ターボ実行',
                                    data: results.chartData.dataB,
                                    borderColor: '#10b981',
                                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                    tension: 0.3,
                                    borderWidth: 2,
                                    pointRadius: 0,
                                    pointHoverRadius: 6,
                                    fill: true
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                    labels: {
                                        font: { size: 12, weight: 'bold' },
                                        padding: 20,
                                        usePointStyle: true
                                    }
                                },
                                title: {
                                    display: true,
                                    text: '総資産成長比較（横軸：経過日数、縦軸：実質総資産）',
                                    font: { size: 14, weight: 'bold' }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        callback: function(value) {
                                            return value.toLocaleString();
                                        },
                                        font: { size: 10 }
                                    },
                                    grid: {
                                        color: 'rgba(200, 200, 200, 0.1)'
                                    }
                                },
                                x: {
                                    ticks: {
                                        font: { size: 10 }
                                    },
                                    grid: {
                                        display: false
                                    }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [results.chartData]);

            const formatNumber = (value) => {
                return Math.round(value).toLocaleString();
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        {/* ヘッダー */}
                        <div className="mb-8">
                            <h1 className="text-4xl font-bold text-gray-800 mb-2">
                                🚀 WebKey ステーキング シミュレーター
                            </h1>
                            <p className="text-gray-600">
                                「利息放置」vs「毎日ターボ実行」の運用パターン比較 | 日利：0.68%（複利）
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* 左側：入力パネル */}
                            <div className="lg:col-span-1">
                                <div className="bg-white rounded-lg shadow-lg p-6 sticky top-6">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6">
                                        📊 パラメータ設定
                                    </h2>

                                    {/* 日利表示（固定） */}
                                    <div className="mb-6 p-4 bg-purple-100 border-l-4 border-purple-500 rounded">
                                        <p className="text-sm font-semibold text-gray-700">📌 ステーキング日利</p>
                                        <p className="text-2xl font-bold text-purple-600 mt-2">0.68%</p>
                                        <p className="text-xs text-gray-600 mt-1">固定値（複利計算）</p>
                                    </div>

                                    {/* 初期投資金額（手持ち） */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            初期投資金額（手持ち）
                                        </label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="range"
                                                min="100"
                                                max="5000"
                                                step="10"
                                                value={initialInvestment}
                                                onChange={(e) => setInitialInvestment(Number(e.target.value))}
                                                className="flex-1 h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                            />
                                        </div>
                                        <input
                                            type="number"
                                            value={initialInvestment}
                                            onChange={(e) => setInitialInvestment(Number(e.target.value))}
                                            step="0.0001"
                                            className="w-full mt-2 px-3 py-2 border border-gray-300 rounded-lg text-right text-lg font-semibold"
                                        />
                                        <p className="text-sm text-gray-500 mt-1">
                                            {formatNumber(initialInvestment)}
                                        </p>
                                    </div>

                                    {/* 初期ステーキング残高 */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            初期ステーキング残高
                                        </label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="range"
                                                min="100"
                                                max="5000"
                                                step="10"
                                                value={initialStaking}
                                                onChange={(e) => setInitialStaking(Number(e.target.value))}
                                                className="flex-1 h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                            />
                                        </div>
                                        <input
                                            type="number"
                                            value={initialStaking}
                                            onChange={(e) => setInitialStaking(Number(e.target.value))}
                                            step="0.0001"
                                            className="w-full mt-2 px-3 py-2 border border-gray-300 rounded-lg text-right text-lg font-semibold"
                                        />
                                        <p className="text-sm text-gray-500 mt-1">
                                            {formatNumber(initialStaking)}
                                        </p>
                                    </div>

                                    {/* 1日あたりの使用USDT */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            1日あたりの使用USDT
                                        </label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="range"
                                                min="0"
                                                max="10000"
                                                step="100"
                                                value={dailyUSDT}
                                                onChange={(e) => setDailyUSDT(Number(e.target.value))}
                                                className="flex-1 h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                            />
                                        </div>
                                        <input
                                            type="number"
                                            value={dailyUSDT}
                                            onChange={(e) => setDailyUSDT(Number(e.target.value))}
                                            className="w-full mt-2 px-3 py-2 border border-gray-300 rounded-lg text-right text-lg font-semibold"
                                        />
                                        <p className="text-sm text-gray-500 mt-1">
                                            {formatNumber(dailyUSDT)} / 日
                                        </p>
                                    </div>

                                    {/* シミュレーション日数 */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            シミュレーション日数
                                        </label>
                                        <div className="flex items-center gap-2">
                                            <input
                                                type="range"
                                                min="1"
                                                max="730"
                                                step="1"
                                                value={days}
                                                onChange={(e) => setDays(Number(e.target.value))}
                                                className="flex-1 h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                            />
                                        </div>
                                        <input
                                            type="number"
                                            value={days}
                                            onChange={(e) => setDays(Number(e.target.value))}
                                            className="w-full mt-2 px-3 py-2 border border-gray-300 rounded-lg text-right text-lg font-semibold"
                                        />
                                        <p className="text-sm text-gray-500 mt-1">
                                            {days} 日間のシミュレーション
                                        </p>
                                    </div>

                                    {/* クイックプリセット */}
                                    <div className="mt-8 pt-6 border-t border-gray-200">
                                        <p className="text-sm font-semibold text-gray-700 mb-3">クイックプリセット</p>
                                        <button
                                            onClick={() => {
                                                setInitialInvestment(730.9262);
                                                setInitialStaking(750.0517);
                                                setDailyUSDT(2000);
                                                setDays(365);
                                            }}
                                            className="w-full bg-purple-500 hover:bg-purple-600 text-white font-semibold py-2 px-4 rounded-lg transition"
                                        >
                                            デフォルトに戻す
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* 右側：グラフと結果表 */}
                            <div className="lg:col-span-2 space-y-8">
                                {/* グラフ */}
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <canvas ref={chartRef} style={{ maxHeight: '400px' }}></canvas>
                                </div>

                                {/* 比較表 */}
                                <div className="bg-white rounded-lg shadow-lg p-6">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-6">
                                        📈 結果比較
                                    </h2>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="bg-gray-100 border-b-2 border-gray-300">
                                                    <th className="px-4 py-3 text-left font-bold text-gray-700">
                                                        項目
                                                    </th>
                                                    <th className="px-4 py-3 text-right font-bold text-blue-600">
                                                        パターンA
                                                        <br />
                                                        <span className="text-xs text-gray-500">
                                                            （利息放置）
                                                        </span>
                                                    </th>
                                                    <th className="px-4 py-3 text-right font-bold text-green-600">
                                                        パターンB
                                                        <br />
                                                        <span className="text-xs text-gray-500">
                                                            （毎日ターボ）
                                                        </span>
                                                    </th>
                                                    <th className="px-4 py-3 text-right font-bold text-gray-700">
                                                        差額
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr className="border-b border-gray-200 hover:bg-gray-50">
                                                    <td className="px-4 py-3 font-semibold text-gray-700">
                                                        手持ち金
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-blue-600 font-semibold">
                                                        {formatNumber(results.patternA.holding)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-green-600 font-semibold">
                                                        {formatNumber(results.patternB.holding)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-gray-700 font-semibold">
                                                        {formatNumber(
                                                            results.patternB.holding - results.patternA.holding
                                                        )}
                                                    </td>
                                                </tr>
                                                <tr className="border-b border-gray-200 hover:bg-gray-50">
                                                    <td className="px-4 py-3 font-semibold text-gray-700">
                                                        ステーキング残高
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-blue-600 font-semibold">
                                                        {formatNumber(results.patternA.staking)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-green-600 font-semibold">
                                                        {formatNumber(results.patternB.staking)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-gray-700 font-semibold">
                                                        {formatNumber(
                                                            results.patternB.staking - results.patternA.staking
                                                        )}
                                                    </td>
                                                </tr>
                                                <tr className="border-b border-gray-200 hover:bg-gray-50">
                                                    <td className="px-4 py-3 font-semibold text-gray-700">
                                                        ターボプール残分
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-blue-600 font-semibold">
                                                        {formatNumber(results.patternA.turbo)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-green-600 font-semibold">
                                                        {formatNumber(results.patternB.turbo)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-gray-700 font-semibold">
                                                        {formatNumber(results.patternB.turbo - results.patternA.turbo)}
                                                    </td>
                                                </tr>
                                                <tr className="border-b border-gray-200 bg-yellow-50 hover:bg-yellow-100">
                                                    <td className="px-4 py-3 font-bold text-gray-800">
                                                        実質総資産
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-blue-700 font-bold text-lg">
                                                        {formatNumber(results.patternA.total)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-green-700 font-bold text-lg">
                                                        {formatNumber(results.patternB.total)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-gray-800 font-bold text-lg">
                                                        {formatNumber(
                                                            results.patternB.total - results.patternA.total
                                                        )}
                                                    </td>
                                                </tr>
                                                <tr className="border-b border-gray-200 hover:bg-gray-50">
                                                    <td className="px-4 py-3 font-semibold text-gray-700">
                                                        使用USDT累計
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-blue-600 font-semibold">
                                                        {formatNumber(results.patternA.usdt)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-green-600 font-semibold">
                                                        {formatNumber(results.patternB.usdt)}
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-red-600 font-semibold">
                                                        {formatNumber(-(results.patternB.usdt - results.patternA.usdt))}
                                                    </td>
                                                </tr>
                                                <tr className="bg-purple-50 hover:bg-purple-100">
                                                    <td className="px-4 py-3 font-bold text-gray-800">
                                                        純利益
                                                    </td>
                                                    <td
                                                        className={`px-4 py-3 text-right font-bold text-lg ${
                                                            results.patternA.profit >= 0
                                                                ? 'text-blue-700'
                                                                : 'text-red-600'
                                                        }`}
                                                    >
                                                        {formatNumber(results.patternA.profit)}
                                                    </td>
                                                    <td
                                                        className={`px-4 py-3 text-right font-bold text-lg ${
                                                            results.patternB.profit >= 0
                                                                ? 'text-green-700'
                                                                : 'text-red-600'
                                                        }`}
                                                    >
                                                        {formatNumber(results.patternB.profit)}
                                                    </td>
                                                    <td
                                                        className={`px-4 py-3 text-right font-bold text-lg ${
                                                            results.patternB.profit >= results.patternA.profit
                                                                ? 'text-green-600'
                                                                : 'text-red-600'
                                                        }`}
                                                    >
                                                        {formatNumber(
                                                            results.patternB.profit - results.patternA.profit
                                                        )}
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* インサイト */}
                                    <div className="mt-6 pt-6 border-t border-gray-200">
                                        <p className="text-sm text-gray-600 mb-3">
                                            <strong>💡 比較インサイト：</strong>
                                        </p>
                                        {results.patternB.profit > results.patternA.profit ? (
                                            <p className="text-green-700 font-semibold">
                                                ✅ パターンB（毎日ターボ）の方が{formatNumber(
                                                    results.patternB.profit - results.patternA.profit
                                                )}多く稼げます！
                                            </p>
                                        ) : (
                                            <p className="text-blue-700 font-semibold">
                                                ✅ パターンA（利息放置）の方が{formatNumber(
                                                    results.patternA.profit - results.patternB.profit
                                                )}多く稼げます！
                                            </p>
                                        )}
                                    </div>

                                    {/* 詳細説明 */}
                                    <div className="mt-6 pt-6 border-t border-gray-200 text-xs text-gray-600 space-y-2">
                                        <p><strong>📌 計算方法：</strong></p>
                                        <p>• <strong>手持ち金</strong>：常に取り出し可能（パターンBでターボ実行時に増加）</p>
                                        <p>• <strong>ステーキング残高</strong>：日利0.68%の複利で毎日増加</p>
                                        <p>• <strong>ターボプール</strong>：毎日の利息が蓄積される場所（複利なし）</p>
                                        <p>• <strong>純利益</strong>：総資産 − 初期投資額 − 使用USDT</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* フッター */}
                        <div className="mt-12 text-center text-gray-600 text-sm">
                            <p>
                                ※ このシミュレーターは教育目的です。実際の運用結果は異なる場合があります。
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<StakingSimulator />, document.getElementById('root'));
    </script>
</body>
</html>
